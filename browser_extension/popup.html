<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: sans-serif;
    }
    h2 {
      margin: 0 0 16px;
      font-size: 16px;
    }
    .status {
      padding: 8px;
      background: #f0f0f0;
      border-radius: 4px;
      margin-bottom: 12px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #1557b0;
    }
  </style>
</head>
<body>
  <h2>xiao-agent</h2>
  
  <div class="status">
    Status: <span id="statusText">Checking...</span>
  </div>
  
  <div class="form-group">
    <label>Host</label>
    <input type="text" id="host" placeholder="localhost" value="localhost">
  </div>
  
  <div class="form-group">
    <label>Port</label>
    <input type="number" id="port" placeholder="8765" value="8765">
  </div>
  
  <button id="connectBtn">Save & Connect</button>
  
  <script src="popup.js"></script>
</body>
</html>
